<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="55%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#0f0a25"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- glow -->
  <circle cx="256" cy="256" r="200" fill="#7c3aed" opacity="0.18"/>

  <!-- outer ring (progress style) -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#1f1340" stroke-width="22"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#ring)" stroke-width="22"
          stroke-linecap="round" stroke-dasharray="800 1068"
          transform="rotate(-90 256 256)"/>

  <!-- inner ring -->
  <circle cx="256" cy="256" r="108" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.55"/>

  <!-- focus dot -->
  <circle cx="256" cy="256" r="38" fill="#ffffff"/>
  <circle cx="256" cy="256" r="38" fill="#7c3aed" opacity="0.15"/>

  <!-- crosshair ticks -->
  <g stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <line x1="256" y1="42" x2="256" y2="86"/>
    <line x1="256" y1="426" x2="256" y2="470"/>
    <line x1="42" y1="256" x2="86" y2="256"/>
    <line x1="426" y1="256" x2="470" y2="256"/>
  </g>
</svg>
